name: Update pscale

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          flakehub: false
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check for update
        id: update
        run: bash update.sh

      - name: Create Pull Request
        if: steps.update.outputs.version
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update pscale to v${{ steps.update.outputs.version }}"
          title: "chore: update pscale to v${{ steps.update.outputs.version }}"
          body: |
            Automated update of PlanetScale CLI to v${{ steps.update.outputs.version }}.

            Release: https://github.com/planetscale/cli/releases/tag/v${{ steps.update.outputs.version }}
          branch: update/pscale-v${{ steps.update.outputs.version }}
          delete-branch: true
          labels: automated

  automerge:
    needs: update
    runs-on: ubuntu-latest
    if: needs.update.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Auto-merge update PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr=$(gh pr list --label automated --state open --json number --jq '.[0].number')
          if [[ -n "$pr" ]]; then
            gh pr merge "$pr" --auto --squash
          fi
